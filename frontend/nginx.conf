# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/html
    text/css
    text/plain
    application/javascript
    application/json
    image/svg+xml;

# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name garden-hive.com www.garden-hive.com fire-hive.com www.fire-hive.com;
    return 301 https://$host$request_uri;
}

# GardenHive app
server {
    listen 443 ssl;
    server_name garden-hive.com www.garden-hive.com;

    ssl_certificate     /etc/letsencrypt/live/fire-hive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fire-hive.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Fire Hive static placeholder
server {
    listen 443 ssl;
    server_name fire-hive.com www.fire-hive.com;

    ssl_certificate     /etc/letsencrypt/live/fire-hive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fire-hive.com/privkey.pem;

    root /usr/share/nginx/fire-hive;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
